name: Collect GitHub Metrics

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  workflow_dispatch:       # allow manual runs from the Actions tab

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to push data and assets back to the repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect metrics
        env:
          TRAFFIC_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: python collect.py

      - name: Generate plots and README
        run: python make_plots.py

      - name: Commit updated data and plots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ assets/ README.md
          git diff --staged --quiet || git commit -m "metrics: $(date -u +%Y-%m-%d)"
          git push
