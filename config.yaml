# GitHub token with repo scope (or set GITHUB_TOKEN env var)
github_token: "${TRAFFIC_TOKEN}"

# Directory where CSV data files are written (relative to this file, or absolute)
data_dir: "data"

# Repos to track
repos:
  - CWorthy-ocean/C-Star
  - CWorthy-ocean/roms-tools
  - CWorthy-ocean/cson-forge

# conda-forge packages to track (no token needed)
conda_packages:
  - roms-tools

# PyPI packages to track (no token needed)
pypi_packages:
  - roms-tools
